name: 기후재정 데이터 수집 & 배포

on:
  # 매월 1일 오전 9시 (KST = UTC 00:00)
  schedule:
    - cron: '0 0 1 * *'

  # 수동 실행 (Actions 탭 → Run workflow)
  workflow_dispatch:
    inputs:
      years:
        description: '수집 연도 (쉼표 구분, 예: 2024,2025,2026)'
        required: false
        default: ''
      force_all:
        description: '전체 연도 재수집 (2022~현재)'
        type: boolean
        default: false

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # data/ 폴더 커밋
      pages: write      # GitHub Pages 배포
      id-token: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 데이터 수집
        env:
          FISCAL_API_KEY: ${{ secrets.FISCAL_API_KEY }}
          COLLECT_YEARS:  ${{ github.event.inputs.years }}
        run: |
          if [[ "${{ github.event.inputs.force_all }}" == "true" ]]; then
            echo "전체 연도 재수집 모드"
            export COLLECT_YEARS=""
          fi
          python scripts/fetch_fiscal.py

      - name: data/ 변경사항 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || \
            git commit -m "📊 기후재정 데이터 업데이트 $(date '+%Y-%m-%d %H:%M')" && \
            git push

      - name: GitHub Pages 배포
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  ./
          exclude_assets: '.github,scripts,*.py,*.yml,*.md'
